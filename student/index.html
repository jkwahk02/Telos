<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telos Student — Taejae University</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f3; --surface:#fff; --surface2:#f2f1ed; --surface3:#eceae4;
  --border:rgba(0,0,0,0.08); --border-em:rgba(0,0,0,0.14);
  --text:#1a1916; --text2:#6b6960; --text3:#9e9c96;
  --blue:#185FA5; --blue-l:#E6F1FB; --blue-m:#378ADD; --blue-b:#B5D4F4;
  --amber:#854F0B; --amber-l:#FAEEDA; --amber-b:#EF9F27; --amber-d:#633806;
  --green:#3B6D11; --green-l:#EAF3DE; --green-b:#C0DD97;
  --red:#A32D2D; --red-l:#FCEBEB;
  --teal:#0F6E56; --teal-l:#E1F5EE; --teal-b:#5DCAA5;
  --gray-l:#F1EFE8; --gray-m:#5F5E5A;
  --r:8px; --r-lg:12px;
  --accent:#0F6E56; --accent-l:#E1F5EE; --accent-m:#1D9E75; --accent-b:#9FE1CB;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:17px;min-height:100vh;}
button,input,select,textarea{font-family:inherit;}

/* NAV */
.topnav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;height:52px;position:sticky;top:0;z-index:100;gap:0;}
.nav-logo{font-size:17px;font-weight:600;color:var(--text);letter-spacing:-0.02em;margin-right:24px;white-space:nowrap;display:flex;align-items:center;gap:6px;}
.nav-logo .role-badge{font-size:10px;font-weight:600;background:var(--accent-l);color:var(--accent);padding:2px 7px;border-radius:20px;letter-spacing:.04em;text-transform:uppercase;}
.nav-tabs{display:flex;height:100%;}
.nav-tab{font-size:17px;font-weight:400;color:var(--text2);padding:0 16px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;display:flex;align-items:center;gap:6px;transition:color .15s;white-space:nowrap;}
.nav-tab:hover{color:var(--text);}
.nav-tab.active{color:var(--accent);border-bottom-color:var(--accent);font-weight:500;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.nav-source{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px;}
.src-dot{width:6px;height:6px;border-radius:50%;background:var(--green);}
.src-dot.loading{background:var(--amber-b);animation:pulse 1s infinite;}
.src-dot.error{background:var(--red);}
.src-dot.authed{background:var(--green);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.nav-avatar{width:30px;height:30px;border-radius:50%;background:var(--accent-l);color:var(--accent);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.nav-name{font-size:13px;color:var(--text2);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nav-user-btn{display:flex;align-items:center;gap:7px;cursor:pointer;padding:4px 6px;border-radius:var(--r);border:none;background:transparent;transition:background .12s;position:relative;}
.nav-user-btn:hover{background:var(--surface2);}
.nav-user-btn .caret{font-size:10px;color:var(--text3);}
.nav-dropdown{display:none;position:absolute;top:calc(100% + 6px);right:0;background:var(--surface);border:1px solid var(--border-em);border-radius:var(--r-lg);min-width:170px;z-index:200;overflow:hidden;}
.nav-dropdown.open{display:block;}
.nav-dropdown-item{display:flex;align-items:center;gap:9px;padding:9px 14px;font-size:17px;color:var(--text);cursor:pointer;transition:background .1s;border:none;background:none;width:100%;text-align:left;font-family:inherit;}
.nav-dropdown-item:hover{background:var(--surface2);}
.nav-dropdown-item.danger{color:var(--red);}
.nav-dropdown-item.danger:hover{background:var(--red-l);}
.nav-dropdown-divider{height:1px;background:var(--border);margin:3px 0;}

/* MAIN */
.main{padding:24px;max-width:1200px;margin:0 auto;width:100%;}
.page{display:none;}
.page.active{display:block;}

/* LOGIN WALL */
#login-wall{position:fixed;inset:0;background:var(--bg);z-index:300;display:flex;align-items:center;justify-content:center;}
.login-card{background:var(--surface);border-radius:16px;border:1px solid var(--border-em);width:100%;max-width:380px;overflow:hidden;margin:0 16px;}
.login-card-top{padding:30px 32px 22px;text-align:center;border-bottom:1px solid var(--border);}
.login-brand{font-size:14px;font-weight:600;color:var(--accent);margin-bottom:6px;}
.login-title{font-size:20px;font-weight:600;color:var(--text);letter-spacing:-0.02em;}
.login-sub{font-size:13px;color:var(--text2);margin-top:4px;line-height:1.5;}
.login-card-body{padding:22px 32px;}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px;}
.fl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.fi{height:38px;border:1px solid var(--border-em);border-radius:var(--r);background:var(--surface2);font-size:14px;color:var(--text);padding:0 11px;outline:none;transition:border-color .15s;width:100%;}
.fi:focus{border-color:var(--accent-m);}
.btn-primary{height:40px;border-radius:var(--r);background:var(--accent);color:#fff;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;width:100%;margin-top:4px;}
.btn-primary:hover{background:#085041;}
.login-err{font-size:12px;color:var(--red);text-align:center;min-height:16px;margin-bottom:4px;}

/* PW CHANGE WALL */
#pw-change-wall{display:none;position:fixed;inset:0;background:var(--bg);z-index:300;align-items:center;justify-content:center;}

/* SETUP BANNER */
#setup-banner{background:var(--amber-l);border-bottom:1px solid var(--amber-b);padding:9px 24px;font-size:13px;color:var(--amber-d);display:flex;align-items:center;gap:10px;}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:12px;}
.card:last-child{margin-bottom:0;}
.card.accent-teal{border-color:var(--teal-b);}
.card.accent-blue{border-color:var(--blue-b);}
.card-hd{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;}
.card-hd.teal-bg{background:var(--teal-l);}
.card-hd.blue-bg{background:var(--blue-l);}
.card-title{font-size:17px;font-weight:600;color:var(--text);}
.card-sub{font-size:14px;color:var(--text2);margin-top:1px;}
.card-body{padding:14px 16px;}
.card-foot{padding:10px 16px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}

/* BADGES */
.bdg{display:inline-block;font-size:13px;font-weight:600;padding:2px 7px;border-radius:20px;white-space:nowrap;}
.bdg-teal{background:var(--teal-l);color:var(--teal);}
.bdg-blue{background:var(--blue-l);color:var(--blue);}
.bdg-amber{background:var(--amber-l);color:var(--amber);}
.bdg-green{background:var(--green-l);color:var(--green);}
.bdg-gray{background:var(--gray-l);color:var(--gray-m);}
.bdg-red{background:var(--red-l);color:var(--red);}

/* BUTTONS */
.btn-teal{font-size:17px;font-weight:600;padding:7px 16px;border-radius:var(--r);background:var(--accent);color:#fff;border:none;cursor:pointer;transition:background .12s;white-space:nowrap;}
.btn-teal:hover{background:#085041;}
.btn-teal:disabled{opacity:.4;cursor:default;}
.btn-sm-teal{font-size:14px;font-weight:600;padding:5px 12px;border-radius:var(--r);background:var(--accent);color:#fff;border:none;cursor:pointer;}
.btn-sm-teal:disabled{opacity:.4;cursor:default;}
.btn-sm-out{font-size:14px;padding:5px 10px;border-radius:var(--r);border:1px solid var(--border-em);background:var(--surface);color:var(--text2);cursor:pointer;}
.btn-sm-out:hover{background:var(--surface2);}
.btn-danger{font-size:14px;padding:5px 10px;border-radius:var(--r);border:1px solid var(--red-l);background:var(--red-l);color:var(--red);cursor:pointer;}

/* STAT ROW */
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px 18px;}
.stat-val{font-size:30px;font-weight:600;letter-spacing:-0.03em;line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:17px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.05em;}

/* PROGRESS */
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.prog-lbl{font-size:17px;font-weight:500;}
.prog-pct{font-size:17px;font-weight:600;color:var(--accent);}
.prog-track{height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;margin-bottom:12px;}
.prog-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .3s;}
.step-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;}
.step-item{display:flex;flex-direction:column;align-items:center;gap:5px;}
.step-dot{width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.sd-done{background:var(--teal-l);color:var(--teal);}
.sd-active{background:var(--accent);color:#fff;}
.sd-todo{background:var(--surface2);color:var(--text3);border:1px solid var(--border-em);}
.step-lbl{font-size:13px;color:var(--text3);text-align:center;line-height:1.4;word-break:keep-all;}
.step-lbl.done{color:var(--accent);}
.step-lbl.active{color:var(--text);font-weight:500;}

/* HISTORY ROW */
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);}
.hist-row:last-child{border-bottom:none;}
.hist-date{font-size:13px;font-weight:500;min-width:100px;}
.hist-who{font-size:13px;color:var(--text2);flex:1;}
.hist-fmt{font-size:12px;color:var(--text3);}

/* PROFILE LAYOUT */
.profile-layout{display:grid;grid-template-columns:210px 1fr;gap:14px;align-items:start;}
.info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
.info-card:last-child{margin-bottom:0;}
.ic-hd{padding:9px 13px;border-bottom:1px solid var(--border);font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;justify-content:space-between;}
.ro-badge{font-size:9px;background:var(--gray-l);color:var(--gray-m);padding:1px 5px;border-radius:6px;font-weight:500;}
.ir{display:flex;flex-direction:column;padding:7px 13px;border-bottom:1px solid var(--border);gap:1px;}
.ir:last-child{border-bottom:none;}
.ir-l{font-size:10px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.ir-v{font-size:12px;color:var(--text);font-weight:500;}

/* SECTION CARDS (My Profile) */
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
.sec-card:last-child{margin-bottom:0;}
.sec-card.filled{border-color:var(--teal-b);}
.sc-hd{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.sc-hd.filled-bg{background:var(--teal-l);}
.sc-hd.active-bg{background:var(--blue-l);}
.sc-num{width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sc-title{font-size:13px;font-weight:600;flex:1;}
.sc-theory{font-size:10px;color:var(--text3);font-style:italic;}
.sc-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;}
.sb-filled{background:var(--teal-l);color:var(--teal);}
.sb-empty{background:var(--gray-l);color:var(--gray-m);}
.sc-body{padding:12px 14px;display:flex;flex-direction:column;gap:9px;}
.hint{font-size:14px;color:var(--text3);line-height:1.5;}
.chip-row{display:flex;flex-wrap:wrap;gap:5px;}
.chip{font-size:14px;padding:4px 10px;border-radius:20px;border:1px solid var(--border-em);background:var(--surface2);color:var(--text2);cursor:pointer;user-select:none;transition:all .12s;}
.chip:hover{border-color:var(--accent-b);color:var(--accent);}
.chip.on{background:var(--teal-l);border-color:var(--teal-b);color:var(--teal);font-weight:500;}
.fta{width:100%;border:1px solid var(--border-em);border-radius:var(--r);background:var(--surface2);font-size:17px;color:var(--text);padding:9px 11px;outline:none;resize:none;line-height:1.6;transition:border-color .15s;}
.fta:focus{border-color:var(--accent-m);}
.fta::placeholder{color:var(--text3);}
.fta-lbl{font-size:13px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.sc-foot{padding:9px 14px;background:var(--surface2);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.char-c{font-size:12px;color:var(--text3);}
.save-status{font-size:14px;color:var(--accent);font-weight:500;}

/* MEETINGS */
.adv-grid{display:grid;gap:10px;margin-bottom:14px;}
@keyframes slideIn{from{opacity:0;transform:translateX(-8px);}to{opacity:1;transform:translateX(0);}}
.adv-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;}
.adv-card.primary-card{border-color:var(--teal-b);}
.adv-hd{padding:8px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:6px;min-height:34px;}
.adv-lbl{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;}
.adv-body{padding:12px 13px;}
.adv-av{width:32px;height:32px;border-radius:50%;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:8px;}
.adv-name{font-size:17px;font-weight:600;margin-bottom:2px;}
.adv-email{font-size:14px;color:var(--blue);margin-bottom:3px;}
.adv-school{font-size:14px;color:var(--text3);margin-bottom:10px;}
.adv-req-btn{font-size:14px;font-weight:600;padding:5px 11px;border-radius:var(--r);background:var(--teal-l);color:var(--teal);border:1px solid var(--teal-b);cursor:pointer;width:100%;transition:background .12s;}
.adv-req-btn:hover{background:var(--accent-b);}
.adv-req-btn:disabled{opacity:.45;cursor:not-allowed;}

.other-card{background:var(--surface2);border:1px dashed var(--border-em);border-radius:var(--r-lg);overflow:hidden;cursor:pointer;transition:all .15s;}
.other-card:hover{border-color:var(--teal-b);background:var(--surface);}
.other-card-body{padding:12px 13px;display:flex;flex-direction:column;align-items:center;gap:7px;text-align:center;}
.other-icon{width:32px;height:32px;border-radius:50%;background:var(--surface);border:1px dashed var(--border-em);display:flex;align-items:center;justify-content:center;color:var(--text3);}
.fsel{width:100%;height:32px;border:1px solid var(--border-em);border-radius:var(--r);background:var(--surface2);font-size:13px;color:var(--text);padding:0 10px;outline:none;appearance:none;cursor:pointer;margin-top:4px;transition:border-color .15s;}
.fsel:focus{border-color:var(--accent-m);}

.meeting-date-big{font-size:20px;font-weight:600;margin-bottom:2px;}
.meeting-meta{font-size:14px;color:var(--text2);margin-bottom:12px;}
.agenda-box{background:var(--teal-l);border-radius:var(--r);padding:10px 12px;margin-bottom:10px;}
.agenda-lbl{font-size:13px;font-weight:600;color:var(--teal);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;}
.agenda-txt{font-size:17px;color:#085041;line-height:1.55;}

.slot-stack{display:flex;flex-direction:column;gap:6px;}
.slot-opt{display:flex;align-items:center;border:1px solid var(--border-em);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:all .18s;background:var(--surface);}
.slot-opt:hover{border-color:var(--blue-b);}
.slot-opt.on{border-color:var(--accent);border-width:1.5px;background:var(--teal-l);}
.slot-left{padding:10px 13px;flex:1;display:flex;align-items:center;gap:10px;}
.slot-radio{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border-em);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;}
.slot-opt.on .slot-radio{border-color:var(--accent);background:var(--accent);}
.slot-radio-dot{width:5px;height:5px;border-radius:50%;background:#fff;opacity:0;}
.slot-opt.on .slot-radio-dot{opacity:1;}
.slot-day{font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);padding:2px 8px;border-radius:20px;flex-shrink:0;transition:all .18s;}
.slot-opt.on .slot-day{background:var(--accent);color:#fff;}
.slot-dt{flex:1;}
.slot-date{font-size:13px;font-weight:500;}
.slot-time{font-size:12px;color:var(--text2);}
.slot-opt.on .slot-date{color:#085041;}
.slot-divider{width:1px;height:42px;background:var(--border);}
.slot-fmt{padding:0 13px;font-size:12px;color:var(--text3);}
.no-slots{font-size:13px;color:var(--text3);font-style:italic;padding:12px 0;text-align:center;}
.week-block{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.week-block:last-child{margin-bottom:0;}
.week-lbl{font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding-bottom:5px;border-bottom:1px solid var(--border);}
.slot-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.slot-day-col{display:flex;flex-direction:column;gap:4px;}
.slot-day-hd{font-size:10px;font-weight:500;color:var(--text3);text-align:center;padding-bottom:3px;}
.slot-cell{padding:6px 3px;border-radius:6px;border:1px solid var(--border-em);background:var(--surface2);cursor:pointer;text-align:center;transition:all .15s;user-select:none;position:relative;}
.slot-cell:hover{border-color:var(--teal-b);}
.slot-cell.on{background:var(--teal-l);border-color:var(--teal-b);border-width:1.5px;}
.slot-cell.on .slot-cell-time{color:#085041;font-weight:500;}
.slot-cell.on .slot-cell-num{color:#085041;}
.slot-cell.disabled{opacity:.35;cursor:not-allowed;border-color:var(--border);}
.slot-cell.disabled:hover{border-color:var(--border);}
.slot-cell-num{font-size:12px;font-weight:500;margin-bottom:1px;}
.slot-cell-time{font-size:10px;color:var(--text2);line-height:1.3;}
.slot-cell-empty{height:52px;}
.prof-strip{display:flex;align-items:center;gap:12px;background:var(--surface2);border-radius:var(--r);padding:10px 13px;border:1px solid var(--border);}
.dur-chip{font-size:14px;padding:5px 14px;border-radius:20px;border:1px solid var(--border-em);background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .12s;user-select:none;font-family:inherit;}
.dur-chip:hover{border-color:var(--teal-b);color:var(--teal);}
.dur-chip.on{background:var(--teal-l);border-color:var(--teal-b);color:var(--teal);font-weight:500;}
.pop-overlay{position:fixed;inset:0;z-index:150;}
.slot-popover{display:none;position:absolute;top:calc(100% + 7px);left:50%;transform:translateX(-50%);z-index:200;background:var(--surface);border:1px solid var(--border-em);border-radius:10px;min-width:160px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,0.1);}
.slot-popover.open{display:block;}
.spop-hd{padding:7px 12px;background:var(--surface2);border-bottom:1px solid var(--border);}
.spop-date{font-size:12px;font-weight:600;}
.spop-hint{font-size:11px;color:var(--text3);margin-top:1px;}
.spop-body{padding:3px 0;}
.spop-row{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;transition:background .1s;position:relative;}
.spop-row:hover,.spop-row.hov{background:var(--teal-l);}
.spop-row.sel{background:var(--teal-l);}
.spop-bar{position:absolute;left:0;top:0;width:3px;height:100%;background:var(--teal);border-radius:0 2px 2px 0;opacity:0;}
.spop-row:hover .spop-bar,.spop-row.hov .spop-bar,.spop-row.sel .spop-bar{opacity:1;}
.spop-lbl{font-size:12px;flex:1;}
.spop-range{font-size:11px;color:var(--text3);}
.spop-row.sel .spop-lbl{color:#085041;font-weight:500;}
.spop-row.sel .spop-range{color:var(--teal);}
.spop-chk{width:14px;height:14px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0;opacity:0;}
.spop-row.sel .spop-chk{opacity:1;}

.refl-section{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:10px;}

.refl-hd-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);}

.btn-edit-sm{font-size:11px;padding:3px 10px;border-radius:var(--r);border:1px solid var(--border-em);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.btn-edit-sm:hover{background:var(--surface2);color:var(--text);}
.add-refl-wrap{margin-top:10px;padding:16px;border:1px dashed var(--border-em);border-radius:var(--r);text-align:center;}

.edit-ta{border:1px solid var(--border-em);border-radius:var(--r);background:var(--surface2);font-size:13px;color:var(--text);padding:8px 10px;width:100%;resize:vertical;font-family:inherit;line-height:1.5;outline:none;transition:border-color .12s;}

/* HELP & GUIDE */

}
.help-hero-p:last-child{
  margin-bottom:0;
}

.help-section{
  margin-bottom:28px;
}
.help-section-title{
  font-size:16px;
  font-weight:600;
  color:var(--text);
  margin-bottom:12px;
  padding-bottom:8px;
  border-bottom:1px solid var(--border);
}

.help-cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}
.help-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);
  padding:18px 20px;
}
.help-card-icon{
  width:36px;
  height:36px;
  border-radius:var(--r);
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:12px;
  font-size:18px;
}
.help-card-icon.blue{background:var(--blue-l);}
.help-card-icon.green{background:var(--green-l);}
.help-card-icon.purple{background:rgba(124,58,237,0.12); color:#7C3AED;}
.help-card-title{
  font-size:15px;
  font-weight:600;
  color:var(--text);
  margin-bottom:6px;
}
.help-card-body{
  font-size:13px;
  color:var(--text2);
  line-height:1.65;
}

.help-steps-wrap{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--r-lg);

}

  display:flex;
  flex-direction:column;
  gap:0;
}
.help-step{
  display:flex;
  gap:16px;

}
.help-step:last-child{
  border-bottom:none;
}
.help-step-num{
  width:28px;

  border-radius:50%;
  background:var(--accent);

  font-size:13px;
  font-weight:600;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  margin-top:1px;
}
.help-step-content{
  flex:1;
}
.help-step-title{
  font-size:14px;
  font-weight:600;
  color:var(--text);
  margin-bottom:4px;
}
.help-step-body{
  font-size:13px;
  color:var(--text2);
  line-height:1.65;
}

.help-tip{
  background:var(--amber-l);
  border:1px solid var(--amber-b);
  border-radius:var(--r);

  gap:10px;
  align-items:flex-start;

}

  font-size:15px;

}
.help-tip-text{
  font-size:13px;
  color:var(--amber-d);
  line-height:1.6;
}
  
/* TOAST */

.text-muted{color:var(--text3);}

.slog-card{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-top:10px;}

.btn-edit-slog{font-size:11px;padding:2px 9px;border-radius:var(--r);border:1px solid var(--border-em);background:var(--surface);color:var(--text2);cursor:pointer;font-family:inherit;transition:all .12s;}

.gs-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:10px;}
.gs-hd{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;}
.gs-hd:hover{background:var(--surface2);}
.gs-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);}
.gs-pct{font-size:11px;color:var(--teal);font-weight:500;}
.gs-body{overflow:hidden;max-height:0;transition:max-height .28s ease;}

.gs-step-title{font-size:12px;font-weight:500;margin-bottom:2px;}
.gs-step-title.done{color:var(--text3);text-decoration:line-through;font-weight:400;}
.gs-step-title.active{color:#085041;}
.gs-step-title.todo{color:var(--text3);}
.gs-step-desc{font-size:11px;color:var(--text2);line-height:1.5;}

.ov-adv-card{background:var(--surface);border:1.5px solid var(--teal-b);border-radius:var(--r-lg);overflow:hidden;margin-bottom:8px;}
.ov-adv-hd{padding:6px 12px;background:var(--teal-l);border-bottom:1px solid var(--teal-b);display:flex;align-items:center;justify-content:space-between;}
.ov-adv-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--teal);}

.ov-adv-av{width:32px;height:32px;border-radius:50%;background:var(--teal-l);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#085041;flex-shrink:0;}

.ov-adv-school{font-size:11px;color:var(--text2);}
.ov-adv-btn{font-size:17px;font-weight:600;padding:7px 16px;border-radius:var(--r);background:var(--accent);color:#fff;border:none;cursor:pointer;font-family:inherit;white-space:nowrap;margin-left:auto;}

.ov-adv-section-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:6px;padding:0 2px;}

<!-- LOGIN WALL -->
<div id="login-wall">
  <div class="login-card">
    <div class="login-card-top">
      <div class="login-brand">Telos <span style="color:var(--text2);font-weight:400;">for Students</span></div>
      <div class="login-title">Sign in</div>
      <div class="login-sub">Use your Taejae student email</div>
    </div>
    <div class="login-card-body">
      <div class="fg">
        <label class="fl">Email</label>
        <input id="wall-email" class="fi" type="email" placeholder="your@taejae.ac.kr"
          onfocus="this.style.borderColor='var(--accent-m)'" onblur="this.style.borderColor=''"
          onkeydown="if(event.key==='Enter')document.getElementById('wall-password').focus()">
      </div>
      <div class="fg">
        <label class="fl">Password</label>
        <input id="wall-password" class="fi" type="password" placeholder="••••••••"
          onfocus="this.style.borderColor='var(--accent-m)'" onblur="this.style.borderColor=''"
          onkeydown="if(event.key==='Enter')handleWallLogin()">
      </div>
      <div class="login-err" id="wall-error"></div>
      <button class="btn-primary" id="wall-submit" onclick="handleWallLogin()">Sign in</button>
    </div>
  </div>
</div>

<!-- PASSWORD CHANGE WALL -->
<div id="pw-change-wall" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:300;align-items:center;justify-content:center;flex-direction:column;">
  <div class="login-card">
    <div class="login-card-top">
      <div class="login-brand">Telos <span style="color:var(--text2);font-weight:400;">for Students</span></div>
      <div class="login-title" id="pw-wall-title">Set your password</div>
      <div class="login-sub" id="pw-wall-desc">This is your first sign-in. Please set a new password.</div>
    </div>
    <div class="login-card-body">
      <div class="fg">
        <label class="fl">New password</label>
        <input id="pw-new" class="fi" type="password" placeholder="At least 8 characters"
          onkeydown="if(event.key==='Enter')document.getElementById('pw-confirm').focus()">
      </div>
      <div class="fg">
        <label class="fl">Confirm password</label>
        <input id="pw-confirm" class="fi" type="password" placeholder="Re-enter new password"
          onkeydown="if(event.key==='Enter')handlePasswordChange()">
      </div>
      <div class="login-err" id="pw-error"></div>
      <button class="btn-primary" id="pw-submit" onclick="handlePasswordChange()">Set password & continue</button>
    </div>
  </div>
</div>

function sbHeaders(extra={}){
  return {'apikey':SUPABASE_KEY,'Authorization':`Bearer ${supabaseUser?.access_token||SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=representation',...extra};
}
async function sbGet(table,params=''){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${params}`,{headers:sbHeaders()});
  if(!r.ok){const b=await r.json().catch(()=>({}));throw new Error(b.message||b.hint||`HTTP ${r.status}`);}
  return r.json();
}
async function sbPatch(table,col,val,row){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`,{method:'PATCH',headers:sbHeaders(),body:JSON.stringify(row)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`PATCH failed: ${r.status}`);}
}
async function sbInsert(table,row){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}`,{method:'POST',headers:sbHeaders(),body:JSON.stringify(row)});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`POST failed: ${r.status}`);}
  return r.json();
}
async function sbDelete(table,col,val){
  const r=await fetch(`${SUPABASE_URL}/rest/v1/${table}?${col}=eq.${encodeURIComponent(val)}`,{method:'DELETE',headers:sbHeaders()});
  if(!r.ok){const e=await r.json().catch(()=>({}));throw new Error(e.message||`DELETE failed: ${r.status}`);}
}

async function handleWallLogin(){
  const email=document.getElementById('wall-email').value.trim();
  const password=document.getElementById('wall-password').value;
  const errEl=document.getElementById('wall-error');
  const btn=document.getElementById('wall-submit');
  if(!email||!password){errEl.textContent='Email and password are required.';return;}
  btn.textContent='Signing in…';btn.disabled=true;errEl.textContent='';
  try{
    const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:'POST',headers:{'apikey':SUPABASE_KEY,'Content-Type':'application/json'},
      body:JSON.stringify({email,password})});
    const data=await r.json();
    if(!r.ok) throw new Error(data.error_description||data.msg||'Login failed');
    supabaseUser=data;
    const studRes=await fetch(
      `${SUPABASE_URL}/rest/v1/students?email=eq.${encodeURIComponent(email)}&select=id,name_en,must_change_password`,
      {headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${data.access_token}`}});
    const studData=await studRes.json();
    if(!studData.length) throw new Error('No student record found. Please contact the program office.');
    const mustChange=studData[0].must_change_password===true;
    document.getElementById('login-wall').style.display='none';
    document.getElementById('src-dot').className='src-dot authed';
    if(mustChange){
      document.getElementById('pw-change-wall').style.display='flex';
      document.getElementById('pw-new').focus();
      return;
    }
    await loadData();
  }catch(e){
    errEl.textContent=e.message;
    btn.textContent='Sign in';btn.disabled=false;
  }
}

// ── DATA LOADING ──
async function loadData(){
  const dot=document.getElementById('src-dot');
  const lbl=document.getElementById('src-label');
  dot.className='src-dot loading';
  lbl.textContent='Loading…';
  try{
    const email=supabaseUser?.user?.email||'';
    // 1. 학생 본인 정보
    const rows=await sbGet(TBL_STUDENTS,`email=eq.${encodeURIComponent(email)}&select=*`);
    if(!rows.length) throw new Error('Student record not found for '+email);
    studentData=rows[0];
    const sid=studentData.id;

    // 2. 병렬 로드
    const [meetingRows,histRows,facultyRows,studentLogRows] = await Promise.all([
      sbGet(TBL_MEETING,`student_id=eq.${sid}&status=in.(scheduled,rescheduling)&order=meeting_date.asc`),
      sbGet(
        TBL_MEETING,
        `student_id=eq.${sid}&order=meeting_date.desc&select=id,meeting_date,faculty_email,meeting_format,meeting_type,status,student_agenda,student_log_id`
      ),
      sbGet(TBL_FACULTY, `select=id,name_en,email,school,is_chair`),
      sbGet(TBL_STUDENT_LOG, `student_id=eq.${sid}&select=student_log_id,meeting_id,reflection,key_takeaway,next_step`)
    ]);

    const studentLogMap = {};
    studentLogRows.forEach(log => {
      studentLogMap[log.meeting_id] = log;
    });
    
    histRows.forEach(m => {
      m.student_log = studentLogMap[m.id] || null;
    });
        
    scheduledMeetings = meetingRows;
    allMeetings       = histRows;
    sessionCount      = histRows.filter(m => m.status === 'completed').length;
    allFaculty        = facultyRows;
    
    // 3. Availability 로드 (어드바이저 + chair 대상)
    const targetEmails=[studentData.advisor1_email,studentData.advisor2_email,
      facultyRows.find(f=>f.is_chair)?.email].filter(Boolean);
    if(targetEmails.length){
      const availRows=await sbGet(TBL_AVAIL,
        `faculty_email=in.(${targetEmails.map(e=>encodeURIComponent(e)).join(',')})&is_active=eq.true&order=day_of_week.asc,start_time.asc`);
      availMap={};
      availRows.forEach(r=>{
        if(!availMap[r.faculty_email]) availMap[r.faculty_email]=[];
        availMap[r.faculty_email].push(r);
      });
    }

    // 4. Nav 업데이트
    const name=studentData.name_en||email.split('@')[0];
    const ini=initials(name);
    document.getElementById('nav-avatar').textContent=ini;
    document.getElementById('nav-name').textContent=name;
    document.getElementById('dd-name').textContent=name;
    document.getElementById('dd-email').textContent=email;
    document.getElementById('nav-user-btn').style.display='flex';
    dot.className='src-dot authed';
    lbl.textContent=`Telos · Live`;
    document.getElementById('setup-banner').style.display='none';
    dataLoaded=true;
    renderCurrent();
  }catch(e){
    console.error('Load error:',e);
    dot.className='src-dot error';
    lbl.textContent=`Load failed: ${e.message}`;
    loadFallback();
  }
}

function renderOverview(){
  const s = studentData;
  const confirmed    = scheduledMeetings.filter(m=>m.advisor_confirmed && m.status==='scheduled');
  const pending      = scheduledMeetings.filter(m=>!m.advisor_confirmed && m.status==='scheduled');
  const rescheduling = scheduledMeetings.filter(m=>m.status==='rescheduling');
  const pct          = calcProfilePct(s);

  // ── Stat cards ──
  const nextDateStr  = confirmed.length ? new Date(confirmed[0].meeting_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '—';
  const pendingCount = pending.length + rescheduling.length;
  const statHtml = `
    <div class="stat-row">
      <div class="stat-card"><div class="stat-val" style="color:var(--accent)">${sessionCount}</div><div class="stat-lbl">Meetings completed</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${confirmed.length?'var(--text)':'var(--text3)'}">${nextDateStr}</div><div class="stat-lbl">Next meeting</div></div>
      <div class="stat-card"><div class="stat-val" style="color:${pendingCount>0?'var(--amber)':'var(--text3)'}">${pendingCount}</div><div class="stat-lbl">Pending requests</div></div>
    </div>`;

  // ── Welcome banner ──
  const initials = (s.name_en||'').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const welcomeHtml = `
    <div class="welcome-banner">
      <div>
        <div class="welcome-name">Welcome, ${esc(s.name_en||'')}</div>
        <div class="welcome-sub">${esc(s.school||'')} · ${esc(s.cohort||'')} · Taejae University</div>
      </div>
      <div class="welcome-av">${initials}</div>
    </div>`;

  // ── Getting started ──
  const profileDone  = pct === 100;
  const meetingDone  = sessionCount > 0;
  const reflDone     = allMeetings.filter(m=>m.status==='completed'&&m.student_log?.reflection).length > 0;
  const allStepsDone = profileDone && meetingDone && reflDone;
  const doneCount    = [profileDone, meetingDone, reflDone].filter(Boolean).length;

  const gsSteps = [
    {
      title: 'Complete your profile',
      desc:  'Add your career goals, research interests, and strengths so your advisor can prepare.',
      done:  profileDone,
      active: !profileDone,
      btn:   !profileDone ? `<button class="btn-sm-teal" onclick="goToProfile()" style="margin-top:6px;">Go to My Profile →</button>` : '',
    },
    {
      title: 'Request your first meeting',
      desc:  'Propose a time with your advisor from the Meetings tab.',
      done:  meetingDone,
      active: profileDone && !meetingDone,
      btn:   profileDone && !meetingDone ? `<button class="btn-sm-teal" onclick="goToMeetings()" style="margin-top:6px;">Go to Meetings →</button>` : '',
    },
    {
      title: 'Write a reflection',
      desc:  'After your first meeting, record what you took away and your next steps.',
      done:  reflDone,
      active: meetingDone && !reflDone,
      btn:   meetingDone && !reflDone ? `<button class="btn-sm-teal" onclick="goToMeetings()" style="margin-top:6px;">Go to Meetings →</button>` : '',
    },
  ];

  const gsStepsHtml = gsSteps.map((st,i) => {
    const numCls = st.done ? 'done' : st.active ? 'active' : '';
    const titleCls = st.done ? 'done' : st.active ? 'active' : 'todo';
    const descCls  = st.done || st.active ? '' : 'todo';
    return `<div class="gs-step">
      <div class="gs-num ${numCls}">${st.done ? '✓' : i+1}</div>
      <div style="flex:1;">
        <div class="gs-step-title ${titleCls}">${st.title}</div>
        ${!st.done ? `<div class="gs-step-desc ${descCls}">${st.desc}</div>` : ''}
        ${st.btn||''}
      </div>
    </div>`;
  }).join('');

  const gsSummary = allStepsDone
    ? `<div style="padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:12px;color:var(--teal);">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><polyline points="2,8 6,12 14,4"/></svg>
        All steps complete — keep up the momentum!
       </div>`
    : `<div class="gs-body open" id="gs-body">${gsStepsHtml}</div>`;

  const gsHtml = `
    <div class="gs-card">
      <div class="gs-hd" onclick="toggleGs()">
        <div style="display:flex;align-items:center;gap:8px;">

        ? gsSummary
        : `<div class="gs-body open" id="gs-body">${gsStepsHtml}</div>`}
    </div>`;

  // ── Upcoming meetings ──
  const nextHtml = confirmed.length ? confirmed.map(m=>{
    const fac = allFaculty.find(f=>f.email===m.faculty_email);

        <button class="btn-sm-teal" style="margin-top:${m.student_agenda?'8':'0'}px;width:fit-content;" onclick="goToMeetings()">View in Meetings →</button>
      </div>
    </div>`;
  }).join('') : '';

  // ── Rescheduling ──
  const reschedulingHtml = rescheduling.length ? rescheduling.map(m=>{
    const fac = allFaculty.find(f=>f.email===m.faculty_email);
    return `<div class="card" style="margin-bottom:10px;border-color:var(--amber-b);">
      <div class="card-hd" style="background:var(--amber-l);">
        <div>
          <div class="card-title" style="color:#633806;">Reschedule needed — ${esc(fac?.name_en||m.faculty_email)}</div>

        </div>
        <span class="bdg bdg-amber">Action needed</span>
      </div>
      <div class="card-body">
        <button class="btn-sm-teal" onclick="goToMeetings()">View in Meetings →</button>
      </div>
    </div>`;
  }).join('') : '';

  // ── Pending ──
  const pendingHtml = pending.length ? `<div class="card accent-blue">
    <div class="card-hd blue-bg">
      <div><div class="card-title" style="color:#0C447C;">${pending.length} pending request${pending.length>1?'s':''}</div>

      <span class="bdg bdg-blue">Pending</span>

function calcProfilePct(s){
  const filled=PROFILE_FIELDS.filter(f=>isFilled(s,f)).length;
  return Math.round(filled/PROFILE_FIELDS.length*100);
}
function isFilled(s,f){
  const tags=(s[f.tags]||[]);
  const text=(s[f.text]||'').trim();
  return tags.length>0||text.length>0;
}

function renderProfile(){
  const s=studentData;
  const infoRows=[
    ['Student ID',s.id||'—'],
    ['Cohort',shortCohort(s.cohort||'')],
    ['Status',`<span class="bdg ${s.status==='Leave of Absence'?'bdg-amber':'bdg-teal'}">${esc(s.status||'—')}</span>`],
    ['School',esc(s.school||'—')],
    ['1st Major',esc(shortMajor(s.major1||''))],
    ...(s.major2?[['2nd Major',esc(shortMajor(s.major2))]]:[]),
    ...(s.minor?[['Minor',esc(shortMajor(s.minor))]]:[]),
  ].map(([l,v])=>`<div class="ir"><div class="ir-l">${l}</div><div class="ir-v">${v}</div></div>`).join('');

  const adv1=allFaculty.find(f=>f.email===s.advisor1_email);

    .filter(Boolean).map(([l,v])=>`<div class="ir"><div class="ir-l">${l}</div><div class="ir-v">${esc(v)}</div></div>`).join('');

  // Progress header

  const stepHtml=PROFILE_FIELDS.map((f,i)=>{
    const filled=isFilled(s,f);
    const isActive=!filled&&PROFILE_FIELDS.slice(0,i).every(pf=>isFilled(s,pf));
    const cls=filled?'sd-done':isActive?'sd-active':'sd-todo';
    const lCls=filled?'done':isActive?'active':'';

  }).join('');

  const progressHtml=`<div class="card" style="margin-bottom:14px;">
    <div class="card-body">
      <div class="prog-top"><span class="prog-lbl">Profile completion</span><span class="prog-pct">${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill" style="width:${pct}%;"></div></div>
      <div class="step-grid">${stepHtml}</div>
    </div>

  // Section cards
  const sectionCards=PROFILE_FIELDS.map((f,i)=>{
    const filled=isFilled(s,f);
    const isActive=!filled&&PROFILE_FIELDS.slice(0,i).every(pf=>isFilled(s,pf));
    const tags=s[f.tags]||[];
    const text=s[f.text]||'';
    const dotCls=filled?'sd-done':isActive?'sd-active':'sd-todo';
    const hdrCls=filled?'filled-bg':isActive?'active-bg':'';
    const cardCls=filled?'filled':'';
    const badgeCls=filled?'sb-filled':'sb-empty';
    const badgeTxt=filled?'Filled':'Empty';

    const chipHtml=f.chips.map(c=>`<div class="chip${tags.includes(c)?' on':''}"
      onclick="toggleChip('${f.key}','${f.tags}',this,'${c.replace(/'/g,"\\'")}')">
      ${esc(c)}</div>`).join('');

    return `<div class="sec-card ${cardCls}" id="sec-${f.key}">
      <div class="sc-hd ${hdrCls}">
        <div class="step-dot ${dotCls}" style="width:22px;height:22px;font-size:11px;">${filled?'✓':i+1}</div>
        <div class="sc-title">${esc(f.label)}</div>
        <span class="sc-theory">${esc(f.theory)}</span>
        <span class="sc-badge ${badgeCls}">${badgeTxt}</span>

      <div class="sc-body">
        <div class="hint">${esc(f.hint)}</div>

          <div class="fta-lbl">In your own words</div>

  document.getElementById('page-profile').innerHTML=`

function toggleChip(key,tagsCol,el,val){
  el.classList.toggle('on');
  const tags=Array.from(document.querySelectorAll(`#sec-${key} .chip.on`)).map(c=>c.textContent.trim());
  studentData[tagsCol]=tags;
  const btn=document.getElementById('btn-'+key);
  const status=document.getElementById('status-'+key);
  if(btn) btn.disabled=false;
  if(status) status.textContent='Unsaved';
}

function onTextInput(key,textCol,ta){
  const btn=document.getElementById('btn-'+key);
  const counter=document.getElementById('char-'+key);
  const status=document.getElementById('status-'+key);
  if(counter) counter.textContent=`${ta.value.length} characters`;
  if(btn) btn.disabled=false;
  if(status) status.textContent='Unsaved';
}

async function saveSection(key,tagsCol,textCol){
  const ta=document.getElementById('fta-'+key);
  const btn=document.getElementById('btn-'+key);
  const status=document.getElementById('status-'+key);
  const tags=studentData[tagsCol]||[];
  const text=ta?.value.trim()||'';
  if(btn){btn.textContent='Saving…';btn.disabled=true;}
  try{
    await sbPatch(TBL_STUDENTS,'id',studentData.id,{[tagsCol]:tags,[textCol]:text});
    studentData[tagsCol]=tags;
    studentData[textCol]=text;
    if(btn){btn.textContent='Save';btn.disabled=true;}  // ← 추가 (저장 완료 후 변경 없으므로 disabled 유지)
    if(status){status.textContent='Saved ✓';setTimeout(()=>{status.textContent='';},2500);}
    showToast('Saved');
    // 프로필 완성도 갱신
    renderOverview();
  }catch(e){
    if(status) status.textContent=`Failed: ${e.message}`;
    if(btn){btn.textContent='Save';btn.disabled=false;}
  }
}

async function saveStudentLog(meetingId){
  const reflection = document.getElementById(`reflection-${meetingId}`)?.value.trim()||'';
  const takeaway   = document.getElementById(`takeaway-${meetingId}`)?.value.trim()||'';
  const nextStep   = document.getElementById(`nextstep-${meetingId}`)?.value.trim()||'';
  const btn    = document.getElementById(`studentlog-btn-${meetingId}`);
  const status = document.getElementById(`studentlog-status-${meetingId}`);
  if(!reflection){showToast('Please write a reflection before saving.');return;}
  if(btn){btn.textContent='Saving…';btn.disabled=true;}
  const m = allMeetings.find(x=>x.id===meetingId);
  const existing = m?.student_log||null;
  try{
    if(existing){
      await sbPatch(TBL_STUDENT_LOG,'student_log_id',existing.student_log_id,{
        reflection, key_takeaway:takeaway, next_step:nextStep,
      });
      existing.reflection=reflection; existing.key_takeaway=takeaway; existing.next_step=nextStep;
      if(btn){btn.textContent='Save changes';btn.disabled=false;}
      if(status){status.textContent='Saved ✓';setTimeout(()=>{status.textContent='';},2500);}
      hideSlogEdit(meetingId);
    } else {
      const newLogId=`SL-${studentData.id}-${meetingId}`;
      const inserted=await sbInsert(TBL_STUDENT_LOG,{
        student_log_id:newLogId, student_id:studentData.id,
        meeting_id:meetingId, reflection, key_takeaway:takeaway, next_step:nextStep,
      });
      if(m) m.student_log=inserted?.[0]||{student_log_id:newLogId,reflection,key_takeaway:takeaway,next_step:nextStep};
      if(btn){btn.textContent='Save reflection';btn.disabled=false;}
      if(status){status.textContent='Saved ✓';setTimeout(()=>{status.textContent='';},2500);}
      showToast('Reflection saved');
      renderMeetings();
      return;
    }
    showToast('Saved');
  }catch(e){
    if(status) status.textContent=`Failed: ${e.message}`;
    if(btn){btn.textContent=existing?'Save changes':'Save reflection';btn.disabled=false;}
  }
}

function buildRequestForm(){
  const s=studentData;
  const excluded=[s.advisor1_email,s.advisor2_email,allFaculty.find(f=>f.is_chair)?.email].filter(Boolean);
  const myFaculty=allFaculty.filter(f=>f.email===s.advisor1_email||f.email===s.advisor2_email||(f.is_chair&&!excluded.slice(0,2).includes(f.email)));
  const otherFaculty=allFaculty.filter(f=>!myFaculty.map(x=>x.email).includes(f.email));

  // ── slot helpers ──
  function tToM(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
  function mToT(m){return `${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`;}
  function getOpts(sl){
    const s=tToM(sl.start_time),e=tToM(sl.end_time);
    const o=[];
    for(let t=s;t+meetingDuration<=e;t+=30)
      o.push({start:mToT(t),end:mToT(t+meetingDuration)});
    return o;
  }
  function isSel(dateStr,start){return selectedMeetingSlots.some(x=>x.dateStr===dateStr&&x.start===start);}
  function pickedCount(dateStr,opts){return opts.filter(o=>isSel(dateStr,o.start)).length;}

  // ── slot grid ──
  function buildSlotGrid(slots){
    if(!slots.length) return '<div class="no-slots">No availability registered for this professor.</div>';
    const today=new Date();today.setHours(0,0,0,0);
    const withDates=[];const seen={};
    for(let week=0;week<2;week++){
      slots.forEach(sl=>{
        const diff=(sl.day_of_week-today.getDay()+7)%7||(week===0?7:0);
        const d=new Date(today);
        d.setDate(today.getDate()+diff+week*7);
        const key=d.toISOString().slice(0,10)+'_'+sl.start_time;
        if(!seen[key]){seen[key]=true;withDates.push({...sl,date:d});}
      });
    }
    withDates.sort((a,b)=>a.date-b.date);
    const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const weeks={};
    withDates.forEach(sl=>{
      const d=new Date(sl.date);
      const sun=new Date(d);sun.setDate(d.getDate()-d.getDay());
      const wk=sun.toISOString().slice(0,10);
      if(!weeks[wk])weeks[wk]={sun,slots:[]};
      weeks[wk].slots.push(sl);
    });
    return Object.values(weeks).map(wk=>{
      const sunStr=wk.sun.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const sat=new Date(wk.sun);sat.setDate(wk.sun.getDate()+6);
      const satStr=sat.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const cols=DAYS.map((d,di)=>{
        const hd=`<div class="slot-day-hd">${d}</div>`;
        const daySlots=wk.slots.filter(sl=>new Date(sl.date).getDay()===di);
        if(!daySlots.length)return `<div class="slot-day-col">${hd}<div class="slot-cell-empty"></div></div>`;
        const cells=daySlots.map(sl=>{
          const dateStr=new Date(sl.date).toISOString().slice(0,10);
          const dateLabel=new Date(sl.date).toLocaleDateString('en-US',{month:'short',day:'numeric'});
          const opts=getOpts(sl);
          const pc=pickedCount(dateStr,opts);
          const dis=opts.length===0;
          const popId=`spop-${dateStr}-${sl.start_time.replace(':','')}`;
          const tRows=opts.map(o=>{
            const sel=isSel(dateStr,o.start);
            return `<div class="spop-row ${sel?'sel':''}"
              onmouseenter="this.classList.add('hov')" onmouseleave="this.classList.remove('hov')"
              onclick="toggleMeetingSlot('${dateStr}','${o.start}','${o.end}','${dateLabel}');event.stopPropagation()">
              <div class="spop-bar"></div>
              <div class="spop-lbl">${o.start}</div>
              <div class="spop-range">${o.start}–${o.end}</div>
              <div class="spop-chk"><svg width="7" height="7" viewBox="0 0 10 10"><polyline points="2,5 4,7 8,3" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
            </div>`;
          }).join('');
          return `<div class="slot-cell ${pc?'on':''} ${dis?'disabled':''}"
            onclick="${dis?'':` toggleSlotPop('${popId}');event.stopPropagation()`}">
            <div class="slot-cell-num">${new Date(sl.date).getDate()}</div>
            <div class="slot-cell-time">${sl.start_time.slice(0,5)}<br>${sl.end_time.slice(0,5)}</div>
            ${pc?`<div class="s-picked" style="font-size:9px;color:#0F6E56;font-weight:600;margin-top:1px;">${pc} picked</div>`:''}

// ── slot popover helpers ──
function toggleSlotPop(id){
  const el=document.getElementById(id);
  if(!el)return;
  const isOpen=el.classList.contains('open');
  document.querySelectorAll('.slot-popover.open').forEach(p=>p.classList.remove('open'));
  if(!isOpen)el.classList.add('open');
}
function toggleMeetingSlot(dateStr,start,end,dateLabel){
  const idx=selectedMeetingSlots.findIndex(x=>x.dateStr===dateStr&&x.start===start);
  if(idx>=0) selectedMeetingSlots.splice(idx,1);
  else selectedMeetingSlots.push({dateStr,start,end,dateLabel});
  document.querySelectorAll('.slot-popover.open').forEach(p=>p.classList.remove('open'));
  renderMeetings();
}

function openRequestForm(email){
  requestFormOpen=true;
  editingRequestId=null;
  selectedFacultyEmail=email;
  selectedMeetingSlots=[];
  meetingDuration=60;
  renderMeetings();
  setTimeout(()=>{
    const form=document.querySelector('.card.accent-teal');
    if(form) form.scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}
  
function closeRequestForm(){
  requestFormOpen=false;
  editingRequestId=null;        // ← 추가
  selectedFacultyEmail=null;
  selectedMeetingSlots=[];
  renderMeetings();
}

// 신규 함수 — openEditRequest
function openEditRequest(meetingId){
  const m = scheduledMeetings.find(x => x.id === meetingId);
  if (!m) return;
  // request form을 edit 모드로 열기
  editingRequestId      = meetingId;
  requestFormOpen       = true;
  selectedFacultyEmail  = m.faculty_email;
  meetingDuration       = m.meeting_duration || 60;
  // 기존 proposed_slots를 selectedMeetingSlots로 복원
  const existing = m.proposed_slots
    ? (typeof m.proposed_slots==='string' ? JSON.parse(m.proposed_slots) : m.proposed_slots)
    : [];
  selectedMeetingSlots = existing;
  renderMeetings();
  setTimeout(()=>{
    const form=document.querySelector('.card.accent-teal');
    if(form) form.scrollIntoView({behavior:'smooth',block:'nearest'});
  },100);
}
  
function selectRequestFaculty(email){
  selectedFacultyEmail=email;
  selectedMeetingSlots=[];
  renderMeetings();
}


async function saveAgenda(meetingId){
  const ta=document.getElementById(`agenda-ta-${meetingId}`);
  const btn=document.getElementById(`agenda-btn-${meetingId}`);
  const status=document.getElementById(`agenda-status-${meetingId}`);
  if(!ta) return;
  if(btn){btn.textContent='Saving…';btn.disabled=true;}
  try{
    await sbPatch(TBL_MEETING,'id',meetingId,{student_agenda:ta.value.trim()});
    const m=scheduledMeetings.find(x=>x.id===meetingId);
    if(m) m.student_agenda=ta.value.trim();
    if(btn){btn.textContent='Save agenda';btn.disabled=true;}  // ← 추가: 텍스트 복원, disabled 유지 (변경 없으므로)
    if(status){status.textContent='Saved ✓';setTimeout(()=>{status.textContent='';},2500);}
    showToast('Agenda saved');
  }catch(e){
    if(status) status.textContent=`Failed: ${e.message}`;
    if(btn){btn.textContent='Save agenda';btn.disabled=false;}
  }
}

async function submitRequest(){
  const agenda=document.getElementById('req-agenda')?.value.trim()||'';
  const type=document.getElementById('req-type')?.value||'Regular';
  // DOM 쿼리 대신 상태 변수 사용 (버그 수정)
  if(!selectedFacultyEmail){showToast('Please select a faculty member.');return;}
  if(!selectedMeetingSlots.length){showToast('Please select at least one available slot.');return;}
  if(!agenda){showToast('Please add an agenda.');return;}
  showToast('Submitting request…');
  try{
    const row={
      student_id:studentData.id,
      faculty_email:selectedFacultyEmail,
      meeting_date:selectedMeetingSlots[0].dateStr, // 첫 번째 제안 날짜
      meeting_format:'Zoom',
      meeting_type:type,
      meeting_duration:meetingDuration,
      proposed_slots:JSON.stringify(selectedMeetingSlots),
      status:'scheduled',
      advisor_confirmed:false,
      created_by:'student',
      student_agenda:agenda,
    };
    const result=await sbInsert(TBL_MEETING,row);
    scheduledMeetings.push(result[0]||row);
    requestFormOpen=false;
    selectedFacultyEmail=null;
    selectedMeetingSlots=[];
    meetingDuration=60;
    renderMeetings();
    showToast('✓ Request submitted — awaiting confirmation');
  }catch(e){
    showToast(`Submit failed: ${e.message}`);
  }
}

async function withdrawRequest(meetingId){
  if(!confirm('Withdraw this meeting request?')) return;
  try{
    await sbPatch(TBL_MEETING,'id',meetingId,{status:'cancelled'});
    scheduledMeetings=scheduledMeetings.filter(m=>m.id!==meetingId);
    renderMeetings();
    showToast('Request withdrawn');
  }catch(e){
    showToast(`Failed: ${e.message}`);
  }
}

// saveEditRequest 교체 — slots까지 저장
async function saveEditRequest(meetingId) {
  const m = scheduledMeetings.find(x => x.id === meetingId);
  if (!m) return;
  const agenda = document.getElementById('req-agenda')?.value.trim() || '';
  if (!selectedMeetingSlots.length) { showToast('Please select at least one slot.'); return; }

  const isRescheduling = m.status === 'rescheduling';

  const patch = {
    student_agenda:   agenda,
    meeting_duration: meetingDuration,
    proposed_slots:   JSON.stringify(selectedMeetingSlots),
    ...(isRescheduling ? {
      status:            'scheduled',
      created_by:        'student',
      advisor_confirmed: false,
      meeting_date:      null,
    } : {}),
  };

  try {
    await sbPatch(TBL_MEETING, 'id', meetingId, patch);
    m.student_agenda     = agenda;
    m.meeting_duration   = meetingDuration;
    m.proposed_slots     = selectedMeetingSlots;
    if (isRescheduling) {
      m.status            = 'scheduled';
      m.created_by        = 'student';
      m.advisor_confirmed = false;
      m.meeting_date      = null;
    }
    editingRequestId     = null;
    requestFormOpen      = false;
    selectedFacultyEmail = null;
    selectedMeetingSlots = [];
    renderMeetings();
    renderOverview();
    showToast(isRescheduling ? 'New time proposed — waiting for advisor confirmation' : 'Request updated');
  } catch(e) {
    showToast(`Update failed: ${e.message}`);
  }
}

async function acceptAdvisorSlot(meetingId, slotIdx) {
  const m = scheduledMeetings.find(x => x.id === meetingId);
  if (!m) return;
  const slots = m.proposed_slots
    ? (typeof m.proposed_slots === 'string' ? JSON.parse(m.proposed_slots) : m.proposed_slots)
    : [];
  const sl = slots[slotIdx];
  if (!sl) return;
  if (!confirm(`Accept meeting on ${sl.dateLabel || sl.dateStr} ${sl.start}–${sl.end}?`)) return;
  try {
    await sbPatch(TBL_MEETING, 'id', meetingId, {
      advisor_confirmed: true,
      meeting_date:      sl.dateStr,
      status:            'scheduled',
    });
    m.advisor_confirmed = true;
    m.meeting_date = sl.dateStr;
    renderMeetings();
    renderOverview();
    showToast(`✓ Meeting confirmed — ${sl.dateLabel || sl.dateStr} ${sl.start}`);
  } catch(e) {
    showToast(`Failed: ${e.message}`);
  }
}
